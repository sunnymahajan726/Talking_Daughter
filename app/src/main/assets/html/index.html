<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff9a9e">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Talking Daughter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #ffd1dc 0%, #ffe8a3 50%, #c1f0ff 100%);
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    pointer-events: none;
    animation: drift 8s infinite ease-in-out;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -30px); }
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
    position: relative;
    z-index: 2;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .title {
    font-size: 22px;
    font-weight: 800;
    color: #d63384;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
  }
  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: none;
    font-size: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    cursor: pointer;
  }
  .icon-btn:active { transform: scale(0.92); }

  .character-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  .character {
    width: 72vmin;
    height: 72vmin;
    max-width: 420px;
    max-height: 420px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
    box-shadow: 0 15px 50px rgba(0,0,0,0.2), inset 0 0 0 10px rgba(255,255,255,0.6);
    border: 10px solid white;
    transition: transform 0.08s;
    background: #fff;
  }
  .character.bounce { animation: bounce 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
  .character.squish { animation: squish 0.4s ease-out; }
  .character.shake  { animation: shake 0.5s; }
  .character.spin   { animation: spin 0.6s ease-in-out; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-40px) scale(1.08, 0.95); }
    60% { transform: translateY(0) scale(0.95, 1.05); }
  }
  @keyframes squish {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15, 0.88); }
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(-8deg); }
    40% { transform: rotate(8deg); }
    60% { transform: rotate(-6deg); }
    80% { transform: rotate(6deg); }
  }
  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(0.9); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .controls {
    display: flex;
    gap: 14px;
    padding: 18px 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: white;
    font-size: 26px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.88); }
  .btn.recording {
    background: #ff4757;
    color: white;
    animation: recordPulse 1s infinite;
  }
  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.7); }
    50% { box-shadow: 0 0 0 15px rgba(255,71,87,0); }
  }
  .btn-label {
    font-size: 10px;
    margin-top: 4px;
    color: #555;
    text-align: center;
  }
  .btn-col { display: flex; flex-direction: column; align-items: center; }

  .floating-emoji {
    position: fixed;
    font-size: 46px;
    pointer-events: none;
    z-index: 10;
    animation: floatUp 1.6s forwards ease-out;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.4) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-250px) scale(1.6) rotate(20deg); opacity: 0; }
  }

  .modal {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    z-index: 100;
  }
  .modal h1 {
    font-size: 32px;
    color: white;
    margin-bottom: 12px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }
  .modal p {
    color: white;
    margin-bottom: 30px;
    font-size: 16px;
    max-width: 300px;
    line-height: 1.4;
  }
  .big-btn {
    background: white;
    color: #d63384;
    padding: 16px 44px;
    border-radius: 40px;
    border: none;
    font-size: 18px;
    font-weight: 700;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    cursor: pointer;
  }
  .big-btn:active { transform: scale(0.95); }
  .hidden { display: none !important; }

  .status-text {
    color: #888;
    font-size: 13px;
    height: 20px;
    margin-top: 8px;
  }

  .talking-glow {
    box-shadow: 0 0 0 0 rgba(255,105,180,0.7), 0 15px 50px rgba(0,0,0,0.2);
    animation: glow 0.4s infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 0 5px rgba(255,105,180,0.4), 0 15px 50px rgba(0,0,0,0.2); }
    to   { box-shadow: 0 0 0 20px rgba(255,105,180,0), 0 15px 50px rgba(0,0,0,0.2); }
  }
</style>
</head>
<body>

<div class="bubble" style="width:80px;height:80px;top:15%;left:8%;animation-delay:0s"></div>
<div class="bubble" style="width:50px;height:50px;top:70%;left:85%;animation-delay:2s"></div>
<div class="bubble" style="width:100px;height:100px;top:80%;left:10%;animation-delay:4s"></div>
<div class="bubble" style="width:60px;height:60px;top:20%;right:10%;animation-delay:1s"></div>

<div class="container" id="app">
  <div class="top-bar">
    <div class="title">✨ Talking Daughter</div>
    <button class="icon-btn" onclick="showUpload()" aria-label="Change photo">📷</button>
  </div>

  <div class="character-wrap">
    <img id="character" class="character" alt="Tap me!" />
  </div>

  <div>
    <div class="controls">
      <div class="btn-col">
        <button class="btn" id="recordBtn" onclick="toggleRecord()" aria-label="Record">🎤</button>
        <div class="btn-label">Talk</div>
      </div>
      <div class="btn-col">
        <button class="btn" onclick="pet()" aria-label="Pet">🤗</button>
        <div class="btn-label">Hug</div>
      </div>
      <div class="btn-col">
        <button class="btn" onclick="tickle()" aria-label="Tickle">🪶</button>
        <div class="btn-label">Tickle</div>
      </div>
      <div class="btn-col">
        <button class="btn" onclick="spinMe()" aria-label="Spin">🌀</button>
        <div class="btn-label">Spin</div>
      </div>
      <div class="btn-col">
        <button class="btn" onclick="dance()" aria-label="Dance">💃</button>
        <div class="btn-label">Dance</div>
      </div>
    </div>
    <div class="status-text" id="status"></div>
  </div>
</div>

<div class="modal" id="uploadScreen">
  <h1>👶 Talking Daughter</h1>
  <p>Upload a photo of your daughter and she becomes the star of the app!</p>
  <button class="big-btn" onclick="document.getElementById('fileInput').click()">📸 Choose Photo</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">
  <p style="margin-top:20px;font-size:12px;opacity:0.8">Photo stays on your device.</p>
</div>

<script>
  // Register service worker for offline support (required for PWA-to-APK)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
    });
  }

  const character = document.getElementById('character');
  const statusEl = document.getElementById('status');
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let audioCtx = null;

  // Use localStorage for persistence (works inside TWA/APK)
  const STORAGE_KEY = 'talkingDaughterPhoto';

  function loadPhoto() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        character.src = saved;
        document.getElementById('uploadScreen').classList.add('hidden');
      }
    } catch (e) { /* storage blocked */ }
  }

  function savePhoto(dataUrl) {
    try { localStorage.setItem(STORAGE_KEY, dataUrl); } catch (e) { /* ignore */ }
  }

  function showUpload() {
    document.getElementById('uploadScreen').classList.remove('hidden');
  }

  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 800;
          let { width, height } = img;
          if (width > height && width > MAX) {
            height = (height * MAX) / width; width = MAX;
          } else if (height > MAX) {
            width = (width * MAX) / height; height = MAX;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handlePhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    statusEl.textContent = 'Saving photo…';
    try {
      const dataUrl = await compressImage(file);
      character.src = dataUrl;
      savePhoto(dataUrl);
      document.getElementById('uploadScreen').classList.add('hidden');
      statusEl.textContent = '';
    } catch (err) {
      statusEl.textContent = 'Could not load that photo. Try another.';
    }
  }

  function playAnim(name) {
    character.classList.remove('bounce','squish','shake','spin');
    void character.offsetWidth;
    character.classList.add(name);
  }

  character.addEventListener('click', () => {
    playAnim('bounce');
    playGiggle();
    spawnEmoji('⭐', '💫', '✨');
  });

  function pet() {
    playAnim('squish');
    spawnEmoji('💖','💕','💗');
    playTone(660, 0.2);
  }

  function tickle() {
    playAnim('shake');
    spawnEmoji('😆','🤣','😂');
    const notes = [700, 900, 800, 1000, 900];
    notes.forEach((f,i) => setTimeout(() => playTone(f, 0.08), i * 70));
  }

  function spinMe() {
    playAnim('spin');
    spawnEmoji('🌀','⭐','🎉');
    playSlide(400, 800, 0.5);
  }

  function dance() {
    spawnEmoji('🎵','🎶','🎵','💃');
    let beat = 0;
    const beats = ['bounce','squish','shake','bounce'];
    const interval = setInterval(() => {
      playAnim(beats[beat % beats.length]);
      playTone([500, 600, 700, 800][beat % 4], 0.1);
      beat++;
      if (beat > 7) clearInterval(interval);
    }, 250);
  }

  function spawnEmoji(...emojis) {
    emojis.forEach((emoji, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.textContent = emoji;
        const rect = character.getBoundingClientRect();
        const spread = 100;
        el.style.left = (rect.left + rect.width/2 - 23 + (Math.random() - 0.5) * spread) + 'px';
        el.style.top = (rect.top + rect.height/2 - 23) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1600);
      }, i * 120);
    });
  }

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration) {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  }

  function playSlide(startFreq, endFreq, duration) {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + duration);
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  }

  function playGiggle() {
    const notes = [800, 1000, 900, 1100, 950];
    notes.forEach((f,i) => setTimeout(() => playTone(f, 0.1), i * 75));
  }

  async function toggleRecord() {
    const btn = document.getElementById('recordBtn');
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.playbackRate = 1.6;
          audio.preservesPitch = false;
          audio.mozPreservesPitch = false;
          audio.webkitPreservesPitch = false;

          character.classList.add('talking-glow');
          statusEl.textContent = '🎵 Playing back...';
          audio.play().catch(err => {
            statusEl.textContent = 'Playback failed: ' + err.message;
          });
          audio.onended = () => {
            character.classList.remove('talking-glow');
            statusEl.textContent = '';
            URL.revokeObjectURL(url);
          };
        };
        mediaRecorder.start();
        isRecording = true;
        btn.classList.add('recording');
        btn.textContent = '⏹';
        statusEl.textContent = '🔴 Recording... (tap to stop)';
        setTimeout(() => { if (isRecording) toggleRecord(); }, 5000);
      } catch (err) {
        statusEl.textContent = 'Mic permission needed.';
        alert('Please allow microphone access.\n\n' + err.message);
      }
    } else {
      mediaRecorder.stop();
      isRecording = false;
      btn.classList.remove('recording');
      btn.textContent = '🎤';
      statusEl.textContent = '';
    }
  }

  loadPhoto();
</script>

</body>
</html>
